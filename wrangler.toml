name = "dnshe-autorenew-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# 定时触发：每 3 个月执行一次（每年 1、4、7、10 月 1 号 UTC 0 点，对应北京时间 8 点）
[triggers]
crons = ["0 0 1 */3 *"]

# 环境变量说明（敏感信息请在 Cloudflare Dashboard 手动配置，不要提交到仓库）
# API_KEY       - 单账号模式：API Key
# API_SECRET    - 单账号模式：API Secret
# API_KEY_N     - 多账号模式：第 N 个账号的 Key（N 从 1 到 20）
# API_SECRET_N  - 多账号模式：第 N 个账号的 Secret
# ACCOUNT_NAME_N- 多账号模式：第 N 个账号的显示名称（可选）
